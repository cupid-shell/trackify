name: Android Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Web Application
      run: npm run build

    - name: Make Gradle Wrapper Executable
      run: chmod +x android/gradlew

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Get version from package.json
      id: get_version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Prepare Release APK File
      run: |
        cp android/app/build/outputs/apk/debug/app-debug.apk trackify-v${{ steps.get_version.outputs.version }}-debug.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trackify-v${{ steps.get_version.outputs.version }}-debug
        path: trackify-v${{ steps.get_version.outputs.version }}-debug.apk
        retention-days: 7

    - name: Create or Update GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        gh release create "v$VERSION" "trackify-v$VERSION-debug.apk" \
          --title "Trackify Release v$VERSION" \
          --notes "Automated release of Trackify version v$VERSION compiled from the master branch." \
          --clobber

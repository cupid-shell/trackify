name: Android Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Web Application
      run: npm run build

    - name: Make Gradle Wrapper Executable
      run: chmod +x android/gradlew

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Get version from package.json
      id: get_version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Prepare Release APK File
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        cp android/app/build/outputs/apk/debug/app-debug.apk "Trackify-v${VERSION}.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Trackify-v${{ steps.get_version.outputs.version }}
        path: Trackify-v${{ steps.get_version.outputs.version }}.apk
        retention-days: 7

    - name: Create or Update GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        
        # Configure Git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Delete all existing releases and tags on remote to keep only the latest version
        gh release list --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
          if [ -n "$tag" ]; then
            echo "Deleting release and tag: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          fi
        done
        
        # Delete local tag if it exists
        git tag -d "v$VERSION" || true
        
        # Create and push the new tag
        git tag "v$VERSION"
        git push origin "v$VERSION" --force
        
        # Create the new Release and upload the asset
        gh release create "v$VERSION" "Trackify-v$VERSION.apk" \
          --title "Trackify Release v$VERSION" \
          --notes "Automated release of Trackify version v$VERSION compiled from the master branch."
